# cargo-deny configuration for signex
#
# Enforces Apache-clean licensing: the main repo's transitive dependency
# closure may not contain GPL / AGPL / unlicensed crates.
#
# Run locally: `cargo deny check licenses`

[graph]
# All targets matter for license compliance, not just the host triple.
all-features = true

[licenses]
# Allowlist: permissive licenses compatible with Apache-2.0 redistribution.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "OFL-1.1",          # Open Font License — used by some embedded font crates
    "CC0-1.0",          # public-domain dedications
    "MPL-2.0",          # weak-copyleft, file-level — acceptable for libraries
    "BSL-1.0",          # Boost — Apache-compatible
    "0BSD",             # zero-clause BSD
    "WTFPL",
    "Unlicense",
    "NCSA",             # University of Illinois/NCSA — BSD-3-equivalent, OSI-approved, Apache-compatible (libfuzzer-sys transitive)
    "CDLA-Permissive-2.0", # Community Data License Agreement — Linux Foundation, OSI-style permissive (webpki-roots transitive via reqwest/sqlx)
]

# Anything not in the allowlist is rejected. GPL / AGPL / LGPL / etc are
# explicitly absent from the allowlist and therefore denied by default.
confidence-threshold = 0.93

# Per-crate exceptions. Use sparingly — every entry is an audit trail
# datum that must be defensible.
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# No banned crates yet, but the section is here so additions are easy.
multiple-versions = "warn"
deny = []

[advisories]
# Surface RUSTSEC advisories at "warn" — security advisories are
# informational in CI (the workflow's continue-on-error: true).
# Critical advisories should still be addressed.
yanked = "warn"
ignore = []

[sources]
# Only crates.io and the official rust-lang git registry are allowed.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
