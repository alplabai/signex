name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: signex.exe
            archive: signex-windows-x86_64.zip

          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: signex.exe
            archive: signex-windows-aarch64.zip

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: signex
            archive: signex-linux-x86_64.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: signex
            archive: signex-linux-aarch64.tar.gz
            cross: true

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: signex
            archive: signex-macos-aarch64.tar.gz

          - target: x86_64-apple-darwin
            os: macos-13
            artifact: signex
            archive: signex-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libvulkan-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Install Linux cross-compilation dependencies (aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libxkbcommon-dev:arm64 libwayland-dev:arm64 \
            libx11-dev:arm64 libxrandr-dev:arm64 libxcursor-dev:arm64 libxi-dev:arm64
          sudo dpkg --add-architecture arm64
          sudo apt-get update
        continue-on-error: true

      - name: Set cross-compilation env
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p signex-app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact }}" staging/
          Compress-Archive -Path staging/* -DestinationPath ${{ matrix.archive }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} staging/
          cd staging
          tar czf ../${{ matrix.archive }} *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Signex ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          files: |
            artifacts/signex-windows-x86_64.zip
            artifacts/signex-windows-aarch64.zip
            artifacts/signex-linux-x86_64.tar.gz
            artifacts/signex-linux-aarch64.tar.gz
            artifacts/signex-macos-aarch64.tar.gz
            artifacts/signex-macos-x86_64.tar.gz
            artifacts/SHA256SUMS.txt
