# SPDX-License-Identifier: Apache-2.0

name: License Guard

# Enforces the issue-62 Apache-clean invariants on every push and PR
# to main / trunk. Targets the actual derivation surface (imports, deps,
# removed API surface) rather than every substring containing "kicad" —
# the latter catches doc comments, migration messages, and stable
# render-style enum variants that serialise to disk.
#
# Allowed residual `kicad` mentions are documented in
# `docs/audit/kicad-derivation.md` §"Residual-mention catalog" with
# rationale per category.
#
# Every job above `port-smell-advisory` is shaped around the issue-62
# KiCad incident and BLOCKS. `port-smell-advisory` (issue #305) is the
# one job here that never blocks: it is a heuristic for a threat the
# rest of this file cannot see — an Apache-incompatible source port of
# some project we have never heard of. It is deliberately weak. The
# actual control for that threat is written policy, in CONTRIBUTING.md
# §"License compliance for contributions".

on:
  push:
    branches: [main, trunk]
  pull_request:
    branches: [main, trunk]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-kicad-imports:
    name: No GPL-licensed parser/writer imports in crates/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid the GPL-licensed parser/writer imports
        run: |
          set -e
          if git grep -nE 'use\s+(kicad_parser|kicad_writer)::' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::Found 'use kicad_parser::' or 'use kicad_writer::' in crates/."
            echo "::error::Those crates moved to the GPL-3.0 companion repo signex-kicad-import."
            echo "::error::See docs/LICENSING.md for the rationale and CONTRIBUTING.md for routing."
            exit 1
          fi
          echo "No KiCad-crate imports."

  no-kicad-cargo-deps:
    name: No GPL-licensed parser/writer Cargo.toml deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid the GPL-licensed parser/writer Cargo.toml deps
        run: |
          set -e
          if git grep -nE '^\s*kicad-(parser|writer)\s*=' -- 'crates/**/Cargo.toml' 'Cargo.toml'; then
            echo ""
            echo "::error::Found a Cargo.toml dependency on kicad-parser / kicad-writer."
            echo "::error::Those crates moved to the GPL-3.0 companion repo signex-kicad-import."
            exit 1
          fi
          echo "No kicad-parser / kicad-writer Cargo.toml deps."

  no-removed-kicad-api:
    name: No re-introduction of the removed GPL-tool API surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid re-introduction of removed types and functions
        run: |
          set -e
          # These names existed in pre-cutover signex-types and have
          # been replaced. A reintroduction (e.g. via a copy-paste
          # from the GPL companion) would regress the licensing
          # invariant.
          if git grep -nE '\bPinElectricalType\b|\bkicad_auto_net_name_from_pins\b|\bexpand_kicad_char_escapes\b|\bparse_markup\s*\(' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::Re-introduction of a KiCad-shaped API surface that was removed in the issue-62 cutover."
            echo "::error::Use the Signex-curated equivalents instead (PinDirection, auto_net_name, parse_signex_markup)."
            exit 1
          fi
          echo "No removed API surface re-introduced."

  no-kicad-shaped-symbols:
    name: No GPL-tool-shaped names anywhere in crates/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid any GPL-tool name mention under crates/
        run: |
          set -e
          # Strict check: the substring "kicad" (any case) is not allowed
          # anywhere under crates/. Renamed equivalents (e.g. ::Standard,
          # escape_for_storage, normalize_text, from_paper_name) are the
          # supported APIs.
          if git grep -niE 'kicad' -- 'crates/**/*.rs' 'crates/**/*.toml'; then
            echo ""
            echo "::error::A 'kicad' / 'KiCad' mention was introduced under crates/."
            echo "::error::Use the renamed equivalents or rephrase the comment to avoid the substring."
            exit 1
          fi
          echo "No KiCad-shaped names anywhere in crates/."

  no-numeric-layer-constants:
    name: No GPL-tool-numbered LayerId constants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid F_CU = 0 / B_CU = 31 style const/static declarations
        run: |
          set -e
          # KiCad's pre-7 `PCB_LAYER_ID` used numeric constants for
          # layer ids (F_CU=0, B_CU=31, …). signex-types replaced
          # this with a semantic `SignexLayer` enum in v0.9.0; any
          # reintroduction of the numeric form is GPL-exposure.
          #
          # Pattern requires the `const`/`static` keyword immediately
          # before the name so doc comments mentioning the historical
          # constants in backticks (e.g. layer.rs's "//! `F_CU = 0`
          # … was replaced") don't false-positive.
          if git grep -nE '\b(?:pub\s+)?(?:const|static)\s+(F_CU|B_CU|F_SILKS|B_SILKS|F_MASK|B_MASK)\b' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::KiCad-numbered layer-id const/static declaration detected."
            echo "::error::Use signex_types::layer::SignexLayer instead — see crates/signex-types/src/layer.rs."
            exit 1
          fi
          echo "No KiCad-numbered layer constants."

  no-kicad-net-name-format:
    name: No GPL-tool auto-net-name format string
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid Net-(<r>-Pad<p>) format string
        run: |
          set -e
          # KiCad's auto-generated unnamed-net format. v0.9.0
          # replaced it with `unnamed-<sheet>:<ref>:<pin>`. A
          # reintroduction would regress the format-design
          # cleanroom we built.
          if git grep -nE 'Net-\([^)]*-Pad' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::KiCad auto-net-name format string Net-(...-Pad...) detected."
            echo "::error::Use signex_types::net::auto_net_name instead."
            exit 1
          fi
          echo "No KiCad auto-net-name format string."

  no-kicad-cpp-class-names:
    name: No GPL-tool C++ class / file references in source comments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid SCH_PAINTER / SCH_FIELD / sch_painter.cpp / etc.
        run: |
          set -e
          # KiCad's C++ implementation uses specific class names
          # (SCH_PAINTER, SCH_FIELD, SCH_SYMBOL, LIB_SYMBOL, …) and
          # filenames (sch_painter.cpp, sch_symbol.cpp, …). Comments
          # in `crates/` referencing these are derivation-shaped
          # attributions in our own words and were scrubbed during
          # the 2026-05-01 comment cleanup. Going forward, source
          # comments must describe behaviour in neutral language and
          # reference docs/RENDERING_RULES.md for the spec.
          #
          # NOTE: The bitflag constant `LIB_SYMBOLS` (plural,
          # without scope operator) is allowed — it's our own
          # bitflag name. Only `LIB_SYMBOL::` and `LIB_PIN::`
          # (singular + scope, the C++ form) are forbidden.
          if git grep -nE '\bSCH_(PAINTER|FIELD|LABEL|PIN|SYMBOL|LINE|RECTANGLE|JUNCTION|BUS|WIRE|TEXT|SHEET|MARKER)\b|\bLIB_(SYMBOL|PIN|FIELD|TEXT)::|\b(sch_painter|sch_symbol\.cpp|sch_label\.cpp|sch_pin\.cpp|lib_symbol\.cpp)\b|\beeschema/' -- 'crates/**/*.rs' 'crates/**/*.toml'; then
            echo ""
            echo "::error::KiCad C++ class name or .cpp file reference detected in crates/."
            echo "::error::Source comments must describe behaviour in neutral terms and"
            echo "::error::reference docs/RENDERING_RULES.md for the rendering spec."
            echo "::error::See docs/audit/comments-scrub-2026-05-01.md for context."
            exit 1
          fi
          echo "No KiCad C++ class names or .cpp file references."

  no-standard-as-comment-word-in-renderer:
    name: No bare `Standard` as a comment word in renderer / engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid `\bStandard\b` substring in signex-render / signex-engine
        run: |
          set -e
          # The v0.10.0 "Standard" rename of KiCad-class names was a
          # cosmetic substitution that left structural derivation in
          # place. The v0.12 cleanroom rewrite removed those references
          # and forbids reintroduction; future contributions must use
          # neutral terms or reference `docs/RENDERING_RULES.md`
          # directly. The `Standard` literal in render-style enum
          # variant names (`PowerPortStyle::Standard`,
          # `LabelStyle::Standard`, `MultisheetStyle::Standard`) is
          # whitelisted because it serialises to disk and renaming
          # would break user files.
          MATCHES=$(git grep -nE '\bStandard\b' -- 'crates/signex-render/' 'crates/signex-engine/' || true)
          if [ -n "$MATCHES" ]; then
            # Whitelist: render-style enum variant declarations + their
            # Display impls. Anything else is a comment-word euphemism
            # and fails the rule.
            FILTERED=$(echo "$MATCHES" | grep -vE '(PowerPortStyle::Standard|LabelStyle::Standard|MultisheetStyle::Standard|"Standard"|^[^:]+:[0-9]+:[[:space:]]+Standard,[[:space:]]*$|Standard => write)' || true)
            if [ -n "$FILTERED" ]; then
              echo "$FILTERED"
              echo ""
              echo "::error::Bare 'Standard' comment-word detected in signex-render / signex-engine."
              echo "::error::Source comments must describe behaviour without the v0.10.0 Standard euphemism."
              echo "::error::Reference docs/RENDERING_RULES.md, IEEE-Std-91, or Altium parity instead."
              exit 1
            fi
          fi
          echo "No bare 'Standard' comment-words in renderer / engine."

  no-kicad-published-format-substrings:
    name: No GPL-tool schematic/PCB/symbol format literals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid the GPL-tool published file-format extension substrings
        run: |
          set -e
          # The Apache-clean Signex repo doesn't read or write KiCad
          # files; the GPL-3.0 companion does. Any literal containing
          # `.kicad_sch` / `.kicad_pcb` / `.kicad_sym` (test fixture
          # filenames, error messages, file dialogs) signals a probable
          # GPL-companion code drift. Use `.snxsch` / `.snxpcb` / `.snxsym`
          # in the Apache crates.
          if git grep -nE '\.kicad_(sch|pcb|sym)\b' -- 'crates/**/*.rs' 'crates/**/*.toml'; then
            echo ""
            echo "::error::Published KiCad file-format extension substring detected in crates/."
            echo "::error::This Apache crate doesn't interop with KiCad files. Use the Signex"
            echo "::error::extensions (.snxsch / .snxpcb / .snxsym) for fixtures and messages."
            exit 1
          fi
          echo "No KiCad published-format substrings."

  no-third-party-constraint-solver-substrings:
    name: No SolveSpace / FreeCAD / planegcs / OpenCascade substrings in sketch crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid third-party constraint-solver substrings under crates/signex-sketch and crates/signex-bake
        run: |
          set -e
          # The v0.13 sketch-mode solver is a cleanroom implementation
          # derived from textbook references (Hearn & Baker, Numerical
          # Recipes). Any reference to a third-party constraint-solver
          # source signals a derivation-shaped contribution and must
          # be reviewed before merge.
          #
          # Word-boundary `\b...\b` so the English word "sketcher" does
          # not collide with our own `SketchError` type (substring
          # `Sketcher` inside `SketchError`). The word "sketcher" still
          # legitimately describes our own product in three audit-allowed
          # files (Cargo.toml description, lib.rs heading, bench example
          # comment) — those are excluded via pathspec.
          if git grep -niE '\b(solvespace|freecad|planegcs|opencascade|sketcher)\b' -- \
               'crates/signex-sketch/**/*.rs' 'crates/signex-sketch/**/*.toml' \
               'crates/signex-bake/**/*.rs' 'crates/signex-bake/**/*.toml' \
               ':!crates/signex-sketch/Cargo.toml' \
               ':!crates/signex-sketch/src/lib.rs' \
               ':!crates/signex-sketch/examples/bench_linalg.rs'; then
            echo ""
            echo "::error::Third-party constraint-solver substring (SolveSpace / FreeCAD / planegcs / OpenCascade / Sketcher) detected under crates/signex-sketch or crates/signex-bake."
            echo "::error::Phase 1-7 of v0.13 ships a cleanroom implementation; references must come from textbooks (Hearn & Baker, Numerical Recipes) only."
            echo "::error::See docs/audit/sketch-solver-2026-05-03.md for the audit trail."
            exit 1
          fi
          echo "No third-party constraint-solver substrings under signex-sketch / signex-bake."

  no-third-party-constraint-solver-attribution:
    name: No "from SolveSpace" / "based on FreeCAD" attribution comments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid attribution comments referencing third-party constraint solvers
        run: |
          set -e
          # Catches the form "// from <Solver>" or "// based on
          # <Solver>" that an agent might use to credit derivation.
          # Word-boundary the solver names to avoid colliding with our
          # own English use of "sketcher" in product descriptions.
          if git grep -niE '(from|based on|adapted from|derived from|copied from|inspired by) [^.]*\b(solvespace|freecad|planegcs|opencascade|sketcher)\b' -- ':!docs/audit/' ':!.github/workflows/license-guard.yml'; then
            echo ""
            echo "::error::Attribution comment referencing a third-party constraint solver detected."
            echo "::error::All algorithm references must cite public textbooks (Hearn & Baker, Numerical Recipes) — see docs/audit/sketch-solver-2026-05-03.md."
            exit 1
          fi
          echo "No third-party constraint-solver attribution comments."

  no-derivation-attribution-markers:
    name: No DeepWiki / GPL-tool-mirror-source markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid "DeepWiki" / GPL-tool-mirror-source / etc. anywhere in repo
        run: |
          set -e
          # Specific markers that appeared in pre-v0.9.0 agent-context
          # skill docs as derivation attribution. They have no
          # legitimate use in Signex source / docs and any future
          # appearance would signal a regression of the agent-context
          # discipline documented in docs/LICENSING.md.
          if git grep -niE 'DeepWiki|KiCad mirror source|extracted from KiCad|based on KiCad source' -- ':!docs/audit/' ':!.github/workflows/license-guard.yml' ':!docs/LICENSING.md' ':!CHANGELOG.md'; then
            echo ""
            echo "::error::Derivation-attribution marker (DeepWiki / KiCad-mirror-source / etc.) detected."
            echo "::error::These have no legitimate use in source or docs outside the audit trail."
            exit 1
          fi
          echo "No derivation-attribution markers."

  port-smell-advisory:
    name: Port-smell heuristic (advisory — never fails)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan crates/ for residue a source port tends to leave
        run: |
          set -uo pipefail
          # WHY THIS JOB EXISTS
          #
          # PR #304 was a Rust port of a CC-BY-4.0 project carrying a
          # "you may not resell this tool" rider — Apache-incompatible,
          # and incompatible with Signex Pro being sold from this tree.
          # It passed every blocking job in this file and `cargo deny`
          # green, because a port is not a Cargo dependency and contains
          # no KiCad-shaped identifier. The contributor declared it clean
          # in good faith; the rule he needed was unwritten. See #305.
          #
          # So this job is NOT the fix. The fix is the policy text in
          # CONTRIBUTING.md. This is a speed bump that catches the
          # residue #304 happened to leave, and it is advisory because a
          # heuristic this cheap must never be able to reject a good PR.
          #
          # Scoping notes, learned the hard way:
          #   * URL tells match STRING LITERALS ONLY and skip comment
          #     lines. The repo legitimately cites allaboutcircuits.com,
          #     vendor docs, and datasheets in comments — a bare
          #     third-party-URL grep is far too broad to be useful.
          #   * URLs in literal position are filtered against an
          #     allowlist of hosts we deliberately integrate with
          #     (distributor APIs, our own domains, SVG namespaces, and
          #     example/test placeholders). Adding a new distributor
          #     will trip this. That is correct and harmless: answer the
          #     question, extend the allowlist in the same PR.
          # Verified at authoring time: 0 hits on trunk, 43 hits on #304.

          ALLOW_HOSTS='(127\.0\.0\.1|localhost|(www\.)?w3\.org|(www\.)?signex\.dev|(www\.)?alplab\.ai|(api|www)\.digikey\.com|(api|www)\.mouser\.com|([a-z0-9-]+\.)*lcsc\.com|(www\.)?jlcpcb\.com|(www\.)?yageo\.com|(www\.)?distributor\.com|([a-z0-9-]+\.)*example(\.[a-z]+)?|([a-z0-9-]+\.)*(test|invalid|localdomain))'
          COMMENT_LINE='^[^:]+:[0-9]+:[[:space:]]*(//|/\*|\*[^/])'
          HITS=0

          report() {
            if [ -z "$2" ]; then return 0; fi
            HITS=$((HITS + $(printf '%s\n' "$2" | wc -l)))
            echo "::warning::Port smell — $1"
            printf '%s\n' "$2" | sed 's/^/    /'
            {
              echo "### $1"
              echo ''
              echo '```'
              printf '%s\n' "$2"
              echo '```'
              echo ''
            } >> "$GITHUB_STEP_SUMMARY"
          }

          # 1. Identifiers naming "the website" — i.e. named after the
          #    thing being ported rather than after what they do.
          M=$(git grep -nE 'like_website|_LIKE_WEBSITE|\bWEBSITE_[A-Z0-9_]+\b' \
                -- 'crates/**/*.rs' || true)
          report 'identifier or test named after "the website" (#304 had WEBSITE_IMPEDANCE_ARC_SEGMENTS)' "$M"

          # 2. A reference-link enum / const pointing at another
          #    project's GitHub repo. Links to our own org are fine.
          M=$(git grep -nE '"https?://(www\.)?github\.com/' -- 'crates/**/*.rs' \
                | grep -vE "$COMMENT_LINE" \
                | grep -viE '"https?://(www\.)?github\.com/(alplabai|signex)/' || true)
          report 'GitHub repo of another project in string-literal position (#304 had a reference-link enum with a Github arm pointing at the ported project)' "$M"

          # 3. A third-party product URL in literal position — the tell
          #    that state is being encoded INTO someone else's tool.
          #    #304 serialised its model into onlinesmithchart.com's
          #    query format via ONLINE_SMITH_CHART_BASE_URL.
          M=$(git grep -nE '"https?://' -- 'crates/**/*.rs' \
                | grep -vE "$COMMENT_LINE" \
                | grep -viE "\"https?://${ALLOW_HOSTS}[\"/:]" || true)
          report 'non-allowlisted third-party URL in string-literal position — is this a codec or state target?' "$M"

          # 4. Tests asserting bug-compatibility with a named external
          #    tool. Matching another tool's rounding quirks is strong
          #    evidence its source was in front of someone.
          M=$(git grep -nE 'fn[[:space:]]+[a-z0-9_]+_like_[a-z0-9_]+[[:space:]]*\(|bug_compat|bug_for_bug|quirk_compat' \
                -- 'crates/**/*.rs' || true)
          report 'test name asserting bug-compatibility with an external tool (#304 had …_rounds_frequency_keys_like_website)' "$M"

          # Heredoc body must stay indented to at least this block
          # scalar's indent (10 spaces) or the YAML block ends early.
          NOTE=$(cat <<'EOF'

          Read this before reacting to anything above.

            * This is a HEURISTIC, not a finding. It greps for residue that a
              source port tends to leave behind. It does not detect derivation.
            * A careful port trips none of it. A clean original can trip it by
              accident — a new distributor URL will do it.
            * A hit is a QUESTION — "where did this come from?" — not an
              accusation, and never a judgement about the person who wrote it.
            * This job cannot fail. It has no power to block your PR, and it is
              not evidence in a review.
            * The real control is the written policy: CONTRIBUTING.md
              §"License compliance for contributions". If you read that and
              your source is fine, it is fine, and a warning here changes
              nothing.
          EOF
          )

          if [ "$HITS" -eq 0 ]; then
            echo "No port smells found."
            echo "This is weak evidence, not a clean bill of health — see the note below."
          else
            echo ""
            echo "$HITS line(s) matched across the tells above."
            echo "$NOTE" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "$NOTE"
          exit 0

  cargo-deny:
    name: cargo-deny license + transitive-dep audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny --all-features check licenses

      - name: Check sources
        run: cargo deny --all-features check sources
        continue-on-error: true

      - name: Check advisories
        run: cargo deny --all-features check advisories
        continue-on-error: true
