name: License Guard

# Enforces the issue-62 Apache-clean invariants on every push and PR
# to dev / main. Targets the actual derivation surface (imports, deps,
# removed API surface) rather than every substring containing "kicad" —
# the latter catches doc comments, migration messages, and stable
# render-style enum variants that serialise to disk.
#
# Allowed residual `kicad` mentions are documented in
# `docs/audit/kicad-derivation.md` §"Residual-mention catalog" with
# rationale per category.

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  no-kicad-imports:
    name: No `use kicad_parser`/`use kicad_writer` in crates/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid kicad-parser / kicad-writer imports
        run: |
          set -e
          if git grep -nE 'use\s+(kicad_parser|kicad_writer)::' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::Found 'use kicad_parser::' or 'use kicad_writer::' in crates/."
            echo "::error::Those crates moved to the GPL-3.0 companion repo signex-kicad-import."
            echo "::error::See docs/LICENSING.md for the rationale and CONTRIBUTING.md for routing."
            exit 1
          fi
          echo "No KiCad-crate imports."

  no-kicad-cargo-deps:
    name: No `kicad-parser`/`kicad-writer` Cargo.toml deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid kicad-parser / kicad-writer Cargo.toml deps
        run: |
          set -e
          if git grep -nE '^\s*kicad-(parser|writer)\s*=' -- 'crates/**/Cargo.toml' 'Cargo.toml'; then
            echo ""
            echo "::error::Found a Cargo.toml dependency on kicad-parser / kicad-writer."
            echo "::error::Those crates moved to the GPL-3.0 companion repo signex-kicad-import."
            exit 1
          fi
          echo "No kicad-parser / kicad-writer Cargo.toml deps."

  no-removed-kicad-api:
    name: No re-introduction of removed KiCad-shaped API surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid re-introduction of removed types and functions
        run: |
          set -e
          # These names existed in pre-cutover signex-types and have
          # been replaced. A reintroduction (e.g. via a copy-paste
          # from the GPL companion) would regress the licensing
          # invariant.
          if git grep -nE '\bPinElectricalType\b|\bkicad_auto_net_name_from_pins\b|\bexpand_kicad_char_escapes\b|\bparse_markup\s*\(' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::Re-introduction of a KiCad-shaped API surface that was removed in the issue-62 cutover."
            echo "::error::Use the Signex-curated equivalents instead (PinDirection, auto_net_name, parse_signex_markup)."
            exit 1
          fi
          echo "No removed API surface re-introduced."

  no-kicad-shaped-symbols:
    name: No KiCad-shaped names anywhere in crates/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid any "kicad" / "KiCad" mention under crates/
        run: |
          set -e
          # Strict check: the substring "kicad" (any case) is not allowed
          # anywhere under crates/. Renamed equivalents (e.g. ::Standard,
          # escape_for_storage, normalize_text, from_paper_name) are the
          # supported APIs.
          if git grep -niE 'kicad' -- 'crates/**/*.rs' 'crates/**/*.toml'; then
            echo ""
            echo "::error::A 'kicad' / 'KiCad' mention was introduced under crates/."
            echo "::error::Use the renamed equivalents or rephrase the comment to avoid the substring."
            exit 1
          fi
          echo "No KiCad-shaped names anywhere in crates/."

  no-numeric-layer-constants:
    name: No KiCad-numbered LayerId constants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid F_CU = 0 / B_CU = 31 style const/static declarations
        run: |
          set -e
          # KiCad's pre-7 `PCB_LAYER_ID` used numeric constants for
          # layer ids (F_CU=0, B_CU=31, …). signex-types replaced
          # this with a semantic `SignexLayer` enum in v0.9.0; any
          # reintroduction of the numeric form is GPL-exposure.
          #
          # Pattern requires the `const`/`static` keyword immediately
          # before the name so doc comments mentioning the historical
          # constants in backticks (e.g. layer.rs's "//! `F_CU = 0`
          # … was replaced") don't false-positive.
          if git grep -nE '\b(?:pub\s+)?(?:const|static)\s+(F_CU|B_CU|F_SILKS|B_SILKS|F_MASK|B_MASK)\b' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::KiCad-numbered layer-id const/static declaration detected."
            echo "::error::Use signex_types::layer::SignexLayer instead — see crates/signex-types/src/layer.rs."
            exit 1
          fi
          echo "No KiCad-numbered layer constants."

  no-kicad-net-name-format:
    name: No KiCad auto-net-name format string
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid Net-(<r>-Pad<p>) format string
        run: |
          set -e
          # KiCad's auto-generated unnamed-net format. v0.9.0
          # replaced it with `unnamed-<sheet>:<ref>:<pin>`. A
          # reintroduction would regress the format-design
          # cleanroom we built.
          if git grep -nE 'Net-\([^)]*-Pad' -- 'crates/**/*.rs'; then
            echo ""
            echo "::error::KiCad auto-net-name format string Net-(...-Pad...) detected."
            echo "::error::Use signex_types::net::auto_net_name instead."
            exit 1
          fi
          echo "No KiCad auto-net-name format string."

  no-kicad-cpp-class-names:
    name: No KiCad C++ class / file references in source comments
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid SCH_PAINTER / SCH_FIELD / sch_painter.cpp / etc.
        run: |
          set -e
          # KiCad's C++ implementation uses specific class names
          # (SCH_PAINTER, SCH_FIELD, SCH_SYMBOL, LIB_SYMBOL, …) and
          # filenames (sch_painter.cpp, sch_symbol.cpp, …). Comments
          # in `crates/` referencing these are derivation-shaped
          # attributions in our own words and were scrubbed during
          # the 2026-05-01 comment cleanup. Going forward, source
          # comments must describe behaviour in neutral language and
          # reference docs/RENDERING_RULES.md for the spec.
          #
          # NOTE: The bitflag constant `LIB_SYMBOLS` (plural,
          # without scope operator) is allowed — it's our own
          # bitflag name. Only `LIB_SYMBOL::` and `LIB_PIN::`
          # (singular + scope, the C++ form) are forbidden.
          if git grep -nE '\bSCH_(PAINTER|FIELD|LABEL|PIN|SYMBOL|LINE|RECTANGLE|JUNCTION|BUS|WIRE|TEXT|SHEET|MARKER)\b|\bLIB_(SYMBOL|PIN|FIELD|TEXT)::|\b(sch_painter|sch_symbol\.cpp|sch_label\.cpp|sch_pin\.cpp|lib_symbol\.cpp)\b|\beeschema/' -- 'crates/**/*.rs' 'crates/**/*.toml'; then
            echo ""
            echo "::error::KiCad C++ class name or .cpp file reference detected in crates/."
            echo "::error::Source comments must describe behaviour in neutral terms and"
            echo "::error::reference docs/RENDERING_RULES.md for the rendering spec."
            echo "::error::See docs/audit/comments-scrub-2026-05-01.md for context."
            exit 1
          fi
          echo "No KiCad C++ class names or .cpp file references."

  no-derivation-attribution-markers:
    name: No DeepWiki / KiCad-mirror-source markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid "DeepWiki" / "KiCad mirror source" / etc. anywhere in repo
        run: |
          set -e
          # Specific markers that appeared in pre-v0.9.0 agent-context
          # skill docs as derivation attribution. They have no
          # legitimate use in Signex source / docs and any future
          # appearance would signal a regression of the agent-context
          # discipline documented in docs/LICENSING.md.
          if git grep -niE 'DeepWiki|KiCad mirror source|extracted from KiCad|based on KiCad source' -- ':!docs/audit/' ':!.github/workflows/license-guard.yml' ':!docs/LICENSING.md' ':!CHANGELOG.md'; then
            echo ""
            echo "::error::Derivation-attribution marker (DeepWiki / KiCad-mirror-source / etc.) detected."
            echo "::error::These have no legitimate use in source or docs outside the audit trail."
            exit 1
          fi
          echo "No derivation-attribution markers."

  cargo-deny:
    name: cargo-deny license + transitive-dep audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses
        run: cargo deny --all-features check licenses

      - name: Check sources
        run: cargo deny --all-features check sources
        continue-on-error: true

      - name: Check advisories
        run: cargo deny --all-features check advisories
        continue-on-error: true
