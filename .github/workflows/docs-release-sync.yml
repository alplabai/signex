name: Docs — release sync

# Fires whenever a version tag is pushed. Updates the version badge,
# flips in-progress markers to ✅, generates a CHANGELOG entry from
# commits since the previous tag, and opens a PR against `main` with
# the result.
#
# This is the "don't forget to update docs" hook. It never pushes to
# main directly — the PR goes through the normal review cycle so a
# human can tweak the changelog wording and bump the docs/internal
# submodule pointer before merge.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync public docs + open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history for changelog)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Split semver for next-patch / next-minor computation.
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR"     >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR"     >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH"     >> "$GITHUB_OUTPUT"

      - name: Update README version badge
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Replace any "version-vX.Y.Z" or "version-vX.Y-dev" with the new tag.
          sed -i -E \
            "s|version-v[0-9]+\.[0-9]+(\.[0-9]+)?(-dev)?|version-v${VERSION}|g" \
            README.md

      - name: Flip in-progress markers to ✅
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAJOR_MINOR="${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}"

          # CLAUDE.md — flip "v0.7.0 — ... 🔄" to "v0.7.0 — ... ✅"
          # (preserve the feature description between the dash and the marker).
          if [ -f .claude/CLAUDE.md ]; then
            sed -i -E "s|(v${VERSION} —.*) 🔄|\1 ✅|g" .claude/CLAUDE.md
            # Also handle the short-form "v0.7.0 ... 🔄" match.
            sed -i -E "s|(v${VERSION}[[:space:]].*) 🔄|\1 ✅|g" .claude/CLAUDE.md
          fi

          # README.md roadmap table — flip "In Progress" rows for this version.
          if [ -f README.md ]; then
            sed -i -E \
              "s|(v${VERSION}[^|]*\|[^|]*)\*\*In Progress\*\*|\1Done|g" \
              README.md
            sed -i -E \
              "s|(v${MAJOR_MINOR}[^|]*\|[^|]*)\*\*In Progress\*\*|\1Done|g" \
              README.md
          fi

          # docs/ROADMAP.md — same treatment for its status column.
          if [ -f docs/ROADMAP.md ]; then
            sed -i -E \
              "s|(v${VERSION}[^|]*\|[^|]*)\*\*In Progress\*\*|\1Done|g" \
              docs/ROADMAP.md
            sed -i -E \
              "s|(v${MAJOR_MINOR}[^|]*\|[^|]*)\*\*In Progress\*\*|\1Done|g" \
              docs/ROADMAP.md
          fi

      - name: Generate CHANGELOG entry
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          TODAY="$(date +%Y-%m-%d)"

          # Find the previous tag that isn't this one. If none (first
          # release), use the repo root.
          PREV_TAG="$(git describe --tags --abbrev=0 --exclude="$TAG" 2>/dev/null || true)"
          if [ -z "$PREV_TAG" ]; then
            RANGE="$TAG"
            echo "No prior tag — using all commits up to $TAG."
          else
            RANGE="$PREV_TAG..$TAG"
            echo "Using commit range $RANGE."
          fi

          # Bucket commits by conventional-commit type. Fallback bucket
          # catches commits that don't use the prefix.
          FEATURES="$(git log --pretty=format:'- %s' "$RANGE" | grep -E '^- feat(\(|:)' || true)"
          FIXES="$(git log --pretty=format:'- %s' "$RANGE" | grep -E '^- fix(\(|:)' || true)"
          REFACTORS="$(git log --pretty=format:'- %s' "$RANGE" | grep -E '^- refactor(\(|:)' || true)"
          DOCS="$(git log --pretty=format:'- %s' "$RANGE" | grep -E '^- docs(\(|:)' || true)"
          OTHER="$(git log --pretty=format:'- %s' "$RANGE" | grep -Ev '^- (feat|fix|refactor|docs|chore|ci|test|style)(\(|:)' || true)"

          ENTRY_FILE="$(mktemp)"
          {
            echo "## [$VERSION] — $TODAY"
            echo ""
            if [ -n "$FEATURES" ]; then
              echo "### Added"
              # Strip the "- feat(scope): " prefix for readability.
              echo "$FEATURES" | sed -E 's|^- feat(\([^)]+\))?:[[:space:]]*|- |'
              echo ""
            fi
            if [ -n "$FIXES" ]; then
              echo "### Fixed"
              echo "$FIXES" | sed -E 's|^- fix(\([^)]+\))?:[[:space:]]*|- |'
              echo ""
            fi
            if [ -n "$REFACTORS" ]; then
              echo "### Refactored"
              echo "$REFACTORS" | sed -E 's|^- refactor(\([^)]+\))?:[[:space:]]*|- |'
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS" | sed -E 's|^- docs(\([^)]+\))?:[[:space:]]*|- |'
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi
          } > "$ENTRY_FILE"

          # Prepend to CHANGELOG.md (create with a header if it doesn't exist).
          if [ ! -f CHANGELOG.md ]; then
            {
              echo "# Changelog"
              echo ""
              echo "All notable releases of Signex are listed here. Format loosely"
              echo "follows [Keep a Changelog](https://keepachangelog.com)."
              echo ""
            } > CHANGELOG.md
          fi

          # Insert the entry after the header (line 4 in the template).
          HEADER_END=4
          head -n "$HEADER_END" CHANGELOG.md > CHANGELOG.tmp
          echo "" >> CHANGELOG.tmp
          cat "$ENTRY_FILE" >> CHANGELOG.tmp
          tail -n +"$((HEADER_END + 1))" CHANGELOG.md >> CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Check for changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Open PR with doc updates
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "docs/release-sync-${{ steps.version.outputs.tag }}"
          base: main
          commit-message: "docs: sync for ${{ steps.version.outputs.tag }}"
          title: "docs: sync for ${{ steps.version.outputs.tag }}"
          body: |
            Automated doc sync triggered by tag `${{ steps.version.outputs.tag }}`.

            **Changes in this PR:**
            - README.md version badge bumped to `v${{ steps.version.outputs.version }}`.
            - Status markers flipped from 🔄 / "In Progress" → ✅ / "Done" for this version in `README.md`, `docs/ROADMAP.md`, and `.claude/CLAUDE.md`.
            - `CHANGELOG.md` updated with a new entry for `${{ steps.version.outputs.version }}` generated from conventional-commit messages since the previous tag.

            **Manual follow-ups (please do before merging):**
            1. Review the CHANGELOG entry — automated bucketing by conventional-commit type can miscategorize older commits. Edit wording, group related items, add context.
            2. Update `docs/internal/docs/MASTER_PLAN.md` (private submodule) — flip the release-plan status and update §6 Current Status. Submodule updates can't be automated from this workflow because it doesn't have a PAT against the private repo.
            3. After merging to `main`, bump the submodule pointer in `dev` via a back-merge PR.
            4. Consider writing a short release-note entry in `docs/internal/docs/MASTER_PLAN.md` §6 "Shipped".

            **Why this is a PR, not a direct push:**
            Auto-generated CHANGELOGs need human editing. Opening a PR keeps the normal review + submodule-bump workflow intact.
          labels: |
            docs
            release
          delete-branch: false

      - name: No changes required
        if: steps.diff.outputs.changed == 'false'
        shell: bash
        run: |
          echo "Docs are already up to date for ${{ steps.version.outputs.tag }}; no PR opened."
