  aliases: ["v0.15.0 — Footprint Editor Parity"]

- title: "v0.16.0 — Command Registry & Symbol Units"
  description: "Command Registry — one addressable action system for menus, keybindings, CLI and plugins — plus the symbol multi-unit tail."
  state: open
