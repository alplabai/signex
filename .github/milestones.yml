# Signex milestone set — the single source of truth for repo milestones.
#
# Edited here, applied automatically by .github/workflows/milestones.yml
# on push to trunk. Treat milestones as code: change them in a PR, get
# them reviewed, let CI sync them. This file exists because the previous
# hand-made milestone set silently drifted away from the roadmap — 14
# milestones, none of them matching docs/ROADMAP.md, none carrying a
# single issue.
#
# The version axis is owned by docs/ROADMAP.md. Do not invent a version
# here that the roadmap does not list; add it to the roadmap first.
#
# Fields:
#   title       — must match the roadmap exactly ("vX.Y.Z — Name")
#   description — one line, user-facing; shown on the milestones page
#   state       — open | closed  (closed = shipped or abandoned)
#   aliases     — former titles to rename FROM, so a corrected title
#                 keeps its issues instead of orphaning them
#
# The sync NEVER deletes a milestone. Milestones carrying issues are
# never modified into a state that would orphan them; anything on GitHub
# but absent here is reported, not removed.

