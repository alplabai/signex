# Built-in keyboard shortcut profile defaults based on KiCad references.

[signex_settings]
application = "signex"
file_kind = "keyboard_shortcuts"
version = 1

[keyboard_shortcuts]
schema_version = 1
profile_id = "kicad"
profile_name = "KiCad"
profile_kind = "built_in"
description = "KiCad-style keyboard shortcut defaults for Signex."

[[keyboard_shortcuts.sections]]
context = "global"

[keyboard_shortcuts.sections.bindings]
"A" = "place_symbol"
"P" = "place_power_symbol"
"W" = "place_wire"
"B" = "place_bus"
"Z" = "place_wire_to_bus_entry"
"L" = "place_local_net_label"
"Ctrl+L" = "place_global_label"
"H" = "place_hierarchical_label"
"J" = "place_junction"
"Q" = "place_no_connect"
"T" = "place_text"
"S" = "draw_hierarchical_sheet"
"I" = "draw_graphic_line"
"Shift+B" = "place_design_block"
"E" = "edit_selected_object_properties"
"M" = "move_selection"
"G" = "drag_keep_connections"
"R" = "rotate_counterclockwise"
"Shift+R" = "rotate_clockwise"
"X" = "mirror_x"
"Y" = "mirror_y"
"F" = "edit_footprint_field"
"U" = "edit_reference_designator"
"V" = "edit_value"
"O" = "autoplace_fields"
"Insert" = "repeat_last_item"
"Delete" = "delete_selection"
"Ctrl+D" = "duplicate"
"D" = "open_datasheet"
"Shift+Space" = "cycle_wire_bus_graphic_mode"
"/" = "switch_segment_posture"
"Backspace" = "undo_last_segment"
"Ctrl+4" = "select_expand_connection"
"Alt+3" = "select_node_or_connection_item"
"`" = "highlight_net_under_cursor"
"~" = "clear_net_highlighting"
"Tab" = "next_highlighted_net_item"
"Shift+Tab" = "previous_highlighted_net_item"
"F1" = "zoom_in_at_cursor"
"F2" = "zoom_out_at_cursor"
"Home" = "zoom_to_fit"
"Ctrl+Home" = "zoom_to_all_objects"
"Ctrl+F5" = "zoom_to_selection_area"
"F4" = "center_on_cursor"
"F5" = "refresh_view"
"Space" = "reset_local_coordinates"
"N" = "next_grid"
"Shift+N" = "previous_grid"
"Alt+1" = "fast_grid_1"
"Alt+2" = "fast_grid_2"
"Alt+4" = "cycle_fast_grid"
"PageUp" = "previous_sheet"
"PageDown" = "next_sheet"
"Alt+Left" = "sheet_navigation_back"
"Alt+Right" = "sheet_navigation_forward"
"Alt+Backspace" = "leave_sheet"
"Alt+Up" = "navigate_up_hierarchy"
"Ctrl+S" = "save_document"
"Ctrl+Shift+S" = "save_document_as"
"Ctrl+O" = "open_document"
"Ctrl+N" = "new_document"
"Ctrl+P" = "print"
"Ctrl+Z" = "undo"
"Ctrl+Y" = "redo"
"Ctrl+C" = "copy"
"Ctrl+X" = "cut"
"Ctrl+V" = "paste"
"Ctrl+Shift+V" = "paste_special"
"Ctrl+A" = "select_all"
"Ctrl+Shift+A" = "unselect_all"
"Ctrl+F" = "find"
"F3" = "find_next"
"Shift+F3" = "find_previous"
"Ctrl+G" = "toggle_search_panel"
"Escape" = "cancel_current_tool"
"F8" = "update_pcb_from_schematic"
"Ctrl+E" = "edit_selected_symbol_in_symbol_editor"
"Ctrl+Shift+E" = "edit_library_symbol"
"Ctrl+Shift+F" = "import_graphics"
