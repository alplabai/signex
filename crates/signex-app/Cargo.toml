[package]
name = "signex-app"
description = "Signex EDA — main application binary (Iced 0.14 + wgpu)"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "signex"
path = "src/main.rs"

[dependencies]
signex-types = { workspace = true }
signex-engine = { workspace = true }
standard-parser = { workspace = true }
standard-writer = { workspace = true }
signex-render = { workspace = true }
iced = { workspace = true }
iced_aw = { workspace = true }
num-traits = "0.2"
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
anyhow = { workspace = true }
signex-widgets = { workspace = true }
signex-erc = { workspace = true }
signex-erc-dsl = { workspace = true }
rfd = { workspace = true }
fontdb = "0.23"
log = "0.4"
image = { version = "0.25", default-features = false, features = ["png"] }

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"
