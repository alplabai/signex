# Legacy v1 footprint fixture — single non-plated mounting hole + 4 fiducials.
#
# Authored by hand for the v1 → v2 migration corpus. Intentionally
# omits `schema_version` and `sketch` (legacy v1 had neither).
# Mix of NPT through-hole + SMD round fiducial pads exercises the
# `drill` Option, the `kind = "NptHole"` enum variant, and the
# `kind = "round"` shape variant.

uuid = "0193a8c0-0010-7000-8000-000000000003"
name = "MOUNTING_HOLE_M3"
anchor = [0.0, 0.0]
courtyard = { points = [[-3.0, -3.0], [3.0, -3.0], [3.0, 3.0], [-3.0, 3.0]] }
silk_f = []
silk_b = []
fab_f = []
fab_b = []
pcb_params = {}
version = "0.0.1"
released = false
created = "2026-04-15T13:00:00Z"
updated = "2026-04-15T13:00:00Z"

[body_3d]
shape = "Extrude"
height_mm = 0.0
offset_z_mm = 0.0
top_color = [0.30, 0.30, 0.30, 1.0]
side_color = [0.30, 0.30, 0.30, 1.0]

# NPT (non-plated) M3 mounting hole at the origin: 3.2 mm drill,
# 6.0 mm restring on copper-clear/courtyard side. Layers list is
# bare since NPT pads usually carry no copper.
[[pads]]
number = "MH1"
kind = "NptHole"
shape = { kind = "round" }
size = [6.0, 6.0]
position = [0.0, 0.0]
rotation = 0.0
layers = ["F.Mask", "B.Mask"]
drill = { diameter = 3.2 }

# Four round fiducial pads at the corners — pad number "FID*"
# convention used elsewhere in the corpus.
[[pads]]
number = "FID1"
kind = "Smd"
shape = { kind = "round" }
size = [1.0, 1.0]
position = [-2.5, -2.5]
rotation = 0.0
layers = ["F.Cu", "F.Mask"]

[[pads]]
number = "FID2"
kind = "Smd"
shape = { kind = "round" }
size = [1.0, 1.0]
position = [2.5, -2.5]
rotation = 0.0
layers = ["F.Cu", "F.Mask"]

[[pads]]
number = "FID3"
kind = "Smd"
shape = { kind = "round" }
size = [1.0, 1.0]
position = [2.5, 2.5]
rotation = 0.0
layers = ["F.Cu", "F.Mask"]

[[pads]]
number = "FID4"
kind = "Smd"
shape = { kind = "round" }
size = [1.0, 1.0]
position = [-2.5, 2.5]
rotation = 0.0
layers = ["F.Cu", "F.Mask"]
