[package]
name = "signex-library"
description = "Component library subsystem for Signex — data model, adapters, diff, search"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
# Enables the 4 community distributor adapters (DigiKey/Mouser/LCSC/JLCPCB),
# OS keyring-backed credential storage, and reqwest-based HTTP. See WS-C.
distributors-community = [
    "dep:keyring",
    "dep:oauth2",
    "dep:reqwest",
    "dep:tokio",
    "dep:dirs",
]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
url = { version = "2", features = ["serde"] }

# Phase 1 WS-A — local + git adapter
git2 = { workspace = true, optional = true }
walkdir = { version = "2", optional = true }

[features]
default = []
local-git = ["dep:git2", "dep:walkdir"]

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true }
wiremock = "0.6"
