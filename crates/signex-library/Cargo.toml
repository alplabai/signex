[package]
name = "signex-library"
description = "Component library subsystem for Signex — data model, adapters, diff, search"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
url = { version = "2", features = ["serde"] }
# Database adapter — HTTP client. Optional so non-server consumers stay lean.
reqwest = { workspace = true, features = ["blocking", "json"], optional = true }

[features]
# Enable the HTTP `DatabaseAdapter` for server-flavour libraries.
database = ["dep:reqwest"]

[dev-dependencies]
tempfile = "3"
