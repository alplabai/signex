[package]
name = "signex-library"
description = "Component library subsystem for Signex — data model, adapters, diff, search"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
# Enables the 4 community distributor adapters (DigiKey/Mouser/LCSC/JLCPCB),
# OS keyring-backed credential storage, and reqwest-based HTTP. See WS-C.
distributors-community = [
    "dep:keyring",
    "dep:oauth2",
    "dep:reqwest",
    "dep:tokio",
    "dep:dirs",
]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
url = { version = "2", features = ["serde"] }
# Database adapter — HTTP client. Optional so non-server consumers stay lean.
reqwest = { workspace = true, features = ["blocking", "json"], optional = true }

[features]
# Enable the HTTP `DatabaseAdapter` for server-flavour libraries.
database = ["dep:reqwest"]

# Phase 1 WS-E: Tantivy search backend (gated behind `search-tantivy`).
tantivy = { workspace = true, optional = true }

[features]
default = []
# Enable the Tantivy-backed `TantivySearchIndex` impl of `SearchIndex`.
search-tantivy = ["dep:tantivy"]

[dev-dependencies]
tempfile = "3"
pdf-writer = { workspace = true }
