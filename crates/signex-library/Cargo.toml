[package]
name = "signex-library"
description = "Component library subsystem for Signex — data model, adapters, diff, search"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []
# Enables the 4 community distributor adapters (DigiKey/Mouser/LCSC/JLCPCB),
# OS keyring-backed credential storage, and reqwest-based HTTP. See WS-C.
distributors-community = [
    "dep:keyring",
    "dep:oauth2",
    "dep:reqwest",
    "dep:tokio",
    "dep:dirs",
]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
url = { version = "2", features = ["serde"] }
# Database adapter — HTTP client. Optional so non-server consumers stay lean.
reqwest = { workspace = true, features = ["blocking", "json"], optional = true }

# Phase 1 / WS-C — gated behind `distributors-community`.
keyring = { workspace = true, optional = true }
# Workspace `oauth2` defaults are fine, but DigiKey scaffolding uses the
# blocking sync HTTP client integration which needs `reqwest-blocking`.
oauth2 = { version = "5", default-features = false, features = ["reqwest", "rustls-tls", "reqwest-blocking"], optional = true }
# Workspace `reqwest` is async-only; LCSC/JLCPCB/Mouser adapters call
# blocking variants from a sync `DistributorAdapter` impl, so we re-declare
# here with the `blocking` feature enabled (additive: same major + crates.io).
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "blocking"], optional = true }
tokio = { workspace = true, optional = true }
dirs = { version = "5", optional = true }

[dev-dependencies]
tempfile = "3"
pdf-writer = { workspace = true }
