[package]
name = "signex-library"
description = "Component library subsystem for Signex — data model, adapters, diff, search"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
url = { version = "2", features = ["serde"] }

# Phase 1 WS-E: Tantivy search backend (gated behind `search-tantivy`).
tantivy = { workspace = true, optional = true }

[features]
default = []
# Enable the Tantivy-backed `TantivySearchIndex` impl of `SearchIndex`.
search-tantivy = ["dep:tantivy"]

[dev-dependencies]
tempfile = "3"
